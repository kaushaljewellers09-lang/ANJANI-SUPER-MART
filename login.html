<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Anjani Super Mart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; 
            min-height: 100vh; font-family: 'Segoe UI', sans-serif;
        }
        .login-container { 
            min-height: 100vh; 
            display: flex; align-items: center; justify-content: center; 
        }
        .login-card { 
            border-radius: 25px !important; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.25) !important; 
            border: none !important; 
            max-width: 450px; width: 100%; 
        }
        .form-control:focus { border-color: #667eea !important; box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25) !important; }
        .btn-login { 
            background: linear-gradient(45deg, #667eea, #764ba2) !important; 
            border: none !important; font-weight: 700 !important; 
            box-shadow: 0 4px 15px rgba(102,126,234,0.4) !important;
        }
    </style>
</head>
<body>
    <div class="login-container p-3">
        <div class="card login-card shadow-lg overflow-hidden">
            <div class="card-header bg-primary text-white text-center py-4">
                <i class="fas fa-shield-alt fa-3x mb-3"></i>
                <h2 class="mb-0 fw-bold">Admin Panel</h2>
                <p class="mb-0 opacity-75">अंजनी सुपर मार्ट</p>
            </div>
            <div class="card-body p-4 p-md-5">
                <form id="loginForm">
                    <div class="mb-4">
                        <label class="form-label fw-bold fs-5 mb-2">📱 Mobile Number <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fas fa-phone"></i></span>
                            <input type="tel" class="form-control fs-5 py-3" id="mobile" placeholder="9876543210" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold fs-5 mb-2">📧 Email <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control fs-5 py-3" id="email" placeholder="admin@anjani.com" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold fs-5 mb-2">🔒 Password <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control fs-5 py-3" id="password" placeholder="••••••••" required>
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()" id="togglePass">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-login w-100 py-3 fs-5 fw-bold shadow-lg mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i>लॉगिन करें
                    </button>
                </form>
                <div class="text-center">
                    <button class="btn btn-link text-decoration-none p-0" onclick="resetPassword()">
                        <i class="fas fa-key me-1"></i>पासवर्ड भूल गए?
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 3 Admin Accounts
        const admins = [
            {mobile: '9876543210', email: 'kaushal@anjani.com', password: 'admin123', role: 'Owner'},
            {mobile: '9876543211', email: 'manager@anjani.com', password: 'manager123', role: 'Manager'},
            {mobile: '9876543212', email: 'staff@anjani.com', password: 'staff123', role: 'Staff'}
        ];

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const mobile = document.getElementById('mobile').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const admin = admins.find(a => a.mobile === mobile && a.email === email && a.password === password);
            
            if(admin) {
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('adminData', JSON.stringify(admin));
                alert(`✅ Welcome ${admin.role}!`);
                window.location.href = 'admin.html';
            } else {
                alert('❌ गलत Mobile/Email/Password! दोबारा कोशिश करें।');
                document.getElementById('loginForm').reset();
            }
        });

        function togglePassword() {
            const pass = document.getElementById('password');
            const toggle = document.getElementById('togglePass');
            if(pass.type === 'password') {
                pass.type = 'text';
                toggle.innerHTML = '<i class="fas fa-eye-slash"></i>';
            } else {
                pass.type = 'password';
                toggle.innerHTML = '<i class="fas fa-eye"></i>';
            }
        }

        function resetPassword() {
            const mobile = prompt('Mobile Number Enter करें:');
            if(admins.find(a => a.mobile === mobile)) {
                alert('✅ Password SMS पर भेज दिया गया!\nDemo Passwords:\nadmin123 / manager123 / staff123');
            } else {
                alert('❌ Registered Mobile Number नहीं है!');
            }
        }
    </script>
</body>
</html>
