<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anjani Super Mart - Everything Store</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header id="header"></header>

    <main class="container-fluid">
        <!-- Hero Banner -->
        <section class="hero-section mb-5">
            <div class="hero-content">
                <h1>🛒 Anjani Super Mart</h1>
                <p>सब कुछ एक ही जगह - Grocery से Jewellery तक!</p>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="🔍 Search Grocery, Clothes, Jewellery...">
                    <button onclick="searchProducts()"><i class="fas fa-search"></i></button>
                </div>
            </div>
        </section>

        <!-- Categories -->
        <section class="categories-section mb-5">
            <h2>🛍️ Shop by Category</h2>
            <div class="categories-grid" id="categoriesGrid">
                <!-- Categories dynamically load -->
            </div>
        </section>

        <!-- Featured Products -->
        <section class="products-section">
            <div class="section-header">
                <h2>🔥 Featured Products</h2>
                <a href="#" class="view-all">View All →</a>
            </div>
            <div class="products-grid" id="productsGrid">
                <!-- Products dynamically load -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer id="footer"></footer>

    <!-- Admin Button (Top Right) -->
    <div class="admin-panel-toggle" onclick="window.location.href='login.html'">
        <i class="fas fa-cog"></i> Admin
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
