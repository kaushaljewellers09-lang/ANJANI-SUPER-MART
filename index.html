<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anjani Super Mart - Online Store</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

<header>
    <h1>Anjani Super Mart</h1>
    <p>Har ghar ki zaroorat, ab online!</p>
</header>

<div class="container">
    <div class="category-title">किराना और राशन (Groceries)</div>
    <div class="product-grid">
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Sugar">
            <h3>चीनी (Sugar)</h3>
            <p class="price">₹45/kg</p>
            <button onclick="sendOrder('Sugar', '45')">WhatsApp Order</button>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Oil">
            <h3>सरसों तेल (Oil)</h3>
            <p class="price">₹160/L</p>
            <button onclick="sendOrder('Oil', '160')">WhatsApp Order</button>
        </div>
    </div>
</div>

<script src="script.js"></script> </body>
</html>
<div class="category-title">कपड़े और साड़ियाँ (Saree & Clothes)</div>
<div class="product-grid">
    <div class="product-card">
        <img src="saree.jpg" alt="Saree"> <h3>Banarasi Saree</h3>
        <p class="price">₹1200</p>
        <button onclick="sendOrder('Banarasi Saree', '1200')">WhatsApp Order</button>
    </div>
</div>

<div class="category-title">बच्चों के खिलौने (Toys)</div>
<div class="product-grid">
    <div class="product-card">
        <img src="toy.jpg" alt="Toy Car">
        <h3>Remote Control Car</h3>
        <p class="price">₹499</p>
        <button onclick="sendOrder('Toy Car', '499')">WhatsApp Order</button>
    </div>
</div>

<div class="category-title">प्लास्टिक का सामान (Plastics)</div>
<div class="product-grid">
    <div class="product-card">
        <img src="bucket.jpg" alt="Bucket">
        <h3>Plastic Bucket (20L)</h3>
        <p class="price">₹150</p>
        <button onclick="sendOrder('Plastic Bucket', '150')">WhatsApp Order</button>
    </div>
</div>
