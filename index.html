<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anjani Super Mart</title>
    <style>
        /* CSS yahan hai */
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; padding-bottom: 50px; }
        header { background: #2874f0; color: white; text-align: center; padding: 20px; }
        .search-box { padding: 10px; background: #2874f0; }
        #searchInput { width: 100%; padding: 12px; border-radius: 5px; border: none; outline: none; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .product-card { background: white; padding: 12px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 10px; }
        .price { color: #28a745; font-weight: bold; font-size: 18px; margin: 10px 0; }
        /* WhatsApp Button Design */
        .order-btn { background: #25D366; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <h1>Anjani Super Mart</h1>
</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Saman dhoondein..." onkeyup="searchProduct()">
</div>

<div class="product-grid">
    <div class="product-card">
        <img src="oil.jpg" alt="Oil">
        <h3>Sarso Tel (1L)</h3>
        <p class="price">₹150</p>
        <button class="order-btn" onclick="sendWhatsApp('Sarso Tel', '160')">WhatsApp Order</button>
    </div>

    <div class="product-card">
        <img src="saree.jpg" alt="Saree">
        <h3>Banarasi Saree</h3>
        <p class="price">₹1200</p>
        <button class="order-btn" onclick="sendWhatsApp('Banarasi Saree', '1200')">WhatsApp Order</button>
    </div>
</div>

<script>
    // WhatsApp function
    function sendWhatsApp(name, price) {
        let phone = "91-8467820968"; // 
        let msg = "Namaste Anjani Mart, mujhe '" + name + "' chahiye. Price: ₹" + price;
        let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);
        window.open(url, "_blank");
    }

    // Search function
    function searchProduct() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('product-card');
        for (let i = 0; i < cards.length; i++) {
            let title = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
            cards[i].style.display = title.includes(input) ? "" : "none";
        }
    }
</script>

</body>
</html>
